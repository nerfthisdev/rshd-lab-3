services:
  pg-1:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret123
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata/pg1:/var/lib/postgresql/data
    networks:
      - pg-net


  pg-2:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret123
    ports:
      - "5433:5433"
    volumes:
      - ./pgdata/pg2:/var/lib/postgresql/data
    networks:
      - pg-net

  pg-3:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret123
    ports:
      - "5434:5434"
    volumes:
      - ./pgdata/pg3:/var/lib/postgresql/data
    networks:
      - pg-net


networks:
  pg-net:
    external: true
    name: pg-net
