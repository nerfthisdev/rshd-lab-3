services:
  pg-1:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret123
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata/pg1:/var/lib/postgresql/data
    networks:
      - pg-net


  pg-2:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret123
    ports:
      - "5433:5432"
    volumes:
      - ./pgdata/pg2:/var/lib/postgresql/data
    networks:
      - pg-net
  #
  # pg-3:
  #   image: postgres:16
  #   restart: always
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: secret123
  #   ports:
  #     - "5434:5432"
  #   volumes:
  #     - ./pgdata/pg3:/var/lib/postgresql/data
  #   networks:
  #     - pg-net
  #

networks:
  pg-net:
    driver: bridge
    name: pg-net
